id: login
version: 1
status: active
title: 登录路径
business_context: |
  虚构业务「星河协作台」的登录路径从提交凭证开始，根据凭证正确性进入不同分支。
  当前 dogfood 示例实现成功分支，失败分支作为已知缺口显式记录。
shared_precondition: 已注册用户访问登录页。
tags: [auth, login]
branches:
  - id: success
    intent: login-success
    condition: 凭证正确且账号可用
    result: 进入仪表盘，并刷新后保持登录态
    priority: P0
edge_branches:
  - id: invalid-password
    condition: 密码错误
    expected_result: 登录被拒绝，并返回可理解的认证失败错误
    reason: dogfood 只验证成功主路径；失败路径由真实业务项目补充独立意图
